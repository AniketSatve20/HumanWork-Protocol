# ════════════════════════════════════════════════════════════════════════════════
#  HumanWork Protocol — CI Pipeline
#  Foundry tests · Backend tests · Linting · Slither security scan
# ════════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Global env shared across jobs ────────────────────────────────────────────

env:
  FOUNDRY_PROFILE: default
  NODE_VERSION: "20"

# ═════════════════════════════════════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Foundry — build & test the 9 smart contracts + integration tests
  # ────────────────────────────────────────────────────────────────────────────
  foundry-tests:
    name: "Foundry · Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build --skip test script --sizes

      - name: Run Foundry test suite
        run: forge test -vvv --gas-report
        env:
          # Fuzz seed for deterministic CI runs
          FOUNDRY_FUZZ_SEED: "0x1234"

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Backend — install, build, and run Jest suite
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend · Jest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Linting — TypeScript (backend + frontend) & Solidity
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint · TypeScript & Solidity"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Node / TypeScript linting ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint backend (ESLint)
        run: npm run lint
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend (ESLint)
        run: npm run lint
        working-directory: frontend

      # ── Solidity linting ───────────────────────────────────────────────────
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check Solidity formatting (forge fmt)
        run: forge fmt --check
        working-directory: contracts

      - name: Install solhint
        run: npm install -g solhint

      - name: Run solhint
        run: solhint 'src/**/*.sol'
        working-directory: contracts

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Security — Slither static analysis on all 9 contracts
  # ────────────────────────────────────────────────────────────────────────────
  slither:
    name: "Security · Slither"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts (Slither needs artifacts)
        run: forge build

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: >-
            --filter-paths "lib/|test/|script/|mocks/"
            --exclude-dependencies
            --fail-on high
          sarif: results/slither.sarif

      - name: Upload Slither SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/slither.sarif
          category: slither
