[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
verbosity = 3

# Gas reporting
gas_reports = ["*"] 

# --- REMAPPINGS MUST BE HERE ---
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Fuzz testing configuration
[fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1234"

# Hedera Testnet configuration
[rpc_endpoints]
hedera_testnet = "https://testnet.hashio.io/api"
localhost = "http://127.0.0.1:8545"

# Etherscan configuration (Must be at the bottom or its own section)
[etherscan]
hedera_testnet = { key = "${HASHSCAN_API_KEY}", url = "https://server-verify.hashscan.io" }
